name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: schemabuilder
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: production
      PORT: 8080
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || 'http://localhost:5173' }}
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/schemabuilder' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || secrets.DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/schemabuilder' }}
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-value-at-least-32-characters' }}
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET || 'test-refresh-secret-at-least-32-characters' }}
      GEMINI_API_KEY_ENCRYPTION_KEY: ${{ secrets.GEMINI_API_KEY_ENCRYPTION_KEY || 'test-encryption-key-at-least-32-chars' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      GEMINI_API_BASE: ${{ vars.GEMINI_API_BASE || 'https://generativelanguage.googleapis.com/v1beta/models' }}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:8080' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --include=dev
      - run: npm run prisma:generate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
