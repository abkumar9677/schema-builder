services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: schemabuilder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    depends_on:
      - postgres
    ports:
      - "8080:8080"
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api
    ports:
      - "5173:5173"
volumes:
  pgdata:
